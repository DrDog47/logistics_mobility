# Germany — country rate file
# ============================
# Statutory minimum wage (Mindestlohn) applies to all sectors. There is no
# separate national statutory sector minimum for road transport.
# Some companies fall under collective agreements (KV Güterverkehr) that
# pay above the Mindestlohn, but these are not universally binding.
# For PM compliance the statutory minimum is the floor.

country: DE
country_name_en: Germany
country_name_pl: Niemcy
country_name_ru: Германия
currency: EUR

# Standard German full-time hours: 40h/week × 52/12 = 173.33
default_hours_per_month: 173.33

official_source:
  primary_url: https://www.mindestlohnkommission.de/
  posting_portal: https://www.zoll.de/EN/Businesses/Work/Foreign-domiciled-employers-posting/foreign-domiciled-employers-posting_node.html
  notes: |
    Mindestlohn is set by the Mindestlohnkommission (independent body of unions,
    employers, and government). Adjustments typically announced 6-12 months in
    advance. No separate sector wage for road transport at federal level.

periods:
  - valid_from: "2025-01-01"
    valid_to: "2025-12-31"
    rates:
      statutory_minimum:
        hourly: 12.82
        description_en: Statutory minimum wage (Mindestlohn)
        description_pl: Ustawowa płaca minimalna (Mindestlohn)
      driver_default:
        hourly: 12.82
        description_en: Driver rate — equals statutory minimum (no federal sector floor)
        description_pl: Stawka kierowcy — równa minimum ustawowemu
    source_documents:
