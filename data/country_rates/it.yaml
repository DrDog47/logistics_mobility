# Italy — country rate file
# =========================
# Italy has NO statutory national minimum wage. The binding floor is the
# applicable CCNL (Contratto Collettivo Nazionale di Lavoro). For road
# transport: CCNL Logistica, Trasporto Merci e Spedizione, renewed
# 27 October 2025 with multi-year increments through 1 June 2027.
#
# CCNL minimums are expressed as monthly gross (paga base) for each
# inquadramento (livello). Convert to hourly using the divisore orario,
# which for this CCNL is based on 39h/week normal time.

country: IT
country_name_en: Italy
country_name_pl: Włochy
country_name_ru: Италия
currency: EUR

# 39h/week × 52/12 = 169 — but CCNL specifies divisore orario = 168
default_hours_per_month: 168.0

official_source:
  primary_url: https://www.contrattotrasporti.it/
  posting_portal: https://www.distaccoue.lavoro.gov.it/
  cnel_archive: https://www.cnel.it/Archivio-Contratti
  notes: |
    No national statutory minimum. CCNL applies via Article 36 of the
    Italian Constitution (right to fair pay) and through erga omnes
    application by case law. PM compliance uses CCNL minimums.
    Renewed 27 Oct 2025; increments scheduled 1 Jan 2026, 1 Jan 2027,
    1 Jun 2027.

# WARNING: Italian CCNL values below are SEED values from sector sources.
# Direct confirmation against the CCNL contract text is recommended before
# using in production — table values are split across paga base, contingenza,
# EDR, and EPA elements that all sum to the minimum.

periods:
