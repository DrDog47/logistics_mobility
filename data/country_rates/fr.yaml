        description_en: CCN 3085 coefficient 138M (PL)
        description_pl: CCN 3085 współczynnik 138M (PL)
      driver_coef_150m:
        hourly: 12.43
        description_en: CCN 3085 coefficient 150M (SPL)
        description_pl: CCN 3085 współczynnik 150M (SPL)
      driver_coef_150m_15y:
